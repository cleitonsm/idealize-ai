[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "idealize-contracts"
version = "0.1.0"
description = "Shared Pydantic models for Idealize AI (mirrors @idealize-ai/contracts)."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.10.0",
]

[project.optional-dependencies]
dev = []

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"
